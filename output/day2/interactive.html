<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SPC Day 2 Outlook</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#1a1a2e;color:#e0e0e0;display:flex;flex-direction:column;height:100vh}
#header{background:linear-gradient(135deg,#16213e,#0f3460);padding:10px 16px;border-bottom:2px solid #e94560;flex-shrink:0}
#header h1{font-size:1.1rem;font-weight:700;color:#fff;letter-spacing:0.5px}
#header p{font-size:0.72rem;color:#aaa;margin-top:2px}
#tabs{display:flex;gap:4px;padding:8px 12px;background:#16213e;flex-shrink:0;flex-wrap:wrap}
.tab-btn{padding:5px 14px;border:1px solid #0f3460;border-radius:20px;background:#0f3460;color:#bbb;
          cursor:pointer;font-size:0.78rem;transition:all .2s;white-space:nowrap}
.tab-btn:hover{background:#e94560;color:#fff;border-color:#e94560}
.tab-btn.active{background:#e94560;color:#fff;border-color:#e94560;font-weight:600}
#map{flex:1;min-height:0}
#legend{position:absolute;bottom:24px;right:10px;z-index:1000;background:rgba(22,33,62,0.92);
         border:1px solid #0f3460;border-radius:8px;padding:10px 14px;min-width:130px;
         box-shadow:0 2px 12px rgba(0,0,0,0.5)}
#legend h4{font-size:0.75rem;text-transform:uppercase;letter-spacing:1px;color:#aaa;
            margin-bottom:8px;border-bottom:1px solid #333;padding-bottom:4px}
.legend-row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.legend-swatch{width:18px;height:14px;border-radius:3px;flex-shrink:0;border:1px solid rgba(255,255,255,0.15)}
.legend-label{font-size:0.75rem;color:#ddd}
.sig-swatch{background:repeating-linear-gradient(45deg,transparent,transparent 3px,rgba(0,0,0,0.4) 3px,rgba(0,0,0,0.4) 4px);
             border:1px solid #888}
#no-data{display:none;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
          z-index:999;text-align:center;color:#888;font-size:1rem}
#info-bar{position:absolute;bottom:24px;left:10px;z-index:1000;background:rgba(22,33,62,0.85);
           border:1px solid #0f3460;border-radius:6px;padding:6px 10px;
           font-size:0.72rem;color:#aaa;max-width:260px;display:none}
</style>
</head>
<body>
<div id="header">
  <h1>&#9928; SPC Day 2 Convective Outlook</h1>
  <p id="fetch-note">Data fetched: 2026-03-26 11:52 UTC</p>
</div>
<div id="tabs"><button class="tab-btn active" data-type="categorical">Categorical</button>
<button class="tab-btn " data-type="tornado">Tornado Prob.</button>
<button class="tab-btn " data-type="wind">Wind Prob.</button>
<button class="tab-btn " data-type="hail">Hail Prob.</button>
</div>
<div style="position:relative;flex:1;min-height:0">
  <div id="map"></div>
  <div id="no-data">No outlook data available for this product.</div>
  <div id="legend"><h4>Legend</h4><div id="legend-items"></div></div>
  <div id="info-bar"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV/XN2GqnU=" crossorigin=""></script>
<script>
(function(){
var LAYERS_DATA   = {"categorical":{"type":"FeatureCollection","features":[{"type":"Feature","geometry":{"type":"Polygon","coordinates":[[[-79.24,33.95],[-80.4,34.73],[-83.82,35.61],[-86.17,35.9],[-88.52,36.51],[-89.45,36.78],[-90.29,37.26],[-90.23,37.9],[-89.48,38.28],[-87.52,38.48],[-86.71,38.65],[-80.68,39.38],[-76.64,39.64],[-73.86838830528853,39.49297934035912],[-74.085,39.198],[-74.372,38.982],[-74.504,38.814],[-74.716,38.67],[-74.701,38.442],[-74.762,38.239],[-75.086,37.666],[-75.263,37.548],[-75.356,37.334],[-75.645,36.894],[-75.371,36.199],[-75.12,35.649],[-75.166,35.243],[-75.279,34.984],[-75.429,34.931],[-75.726,34.857],[-76.265,34.375],[-76.54,34.248],[-76.776,34.354],[-76.936,34.358],[-77.521,34.032],[-77.684,33.615],[-77.95,33.516],[-78.163,33.577],[-78.569,33.483],[-78.64123497800603,33.4304105181044],[-79.24,33.95]]]},"properties":{"DN":2,"VALID":"202603271200","EXPIRE":"202603281200","ISSUE":"202603260545","VALID_ISO":"2026-03-27T12:00:00+00:00","EXPIRE_ISO":"2026-03-28T12:00:00+00:00","ISSUE_ISO":"2026-03-26T05:45:00+00:00","FORECASTER":"Moore","LABEL":"TSTM","LABEL2":"General Thunderstorms Risk","stroke":"#55BB55","fill":"#C1E9C1","_fill":"#C1E9C1","_stroke":"#55BB55","_label":"Thunderstorm","_is_sig":false}}],"_meta":{"source_url":"https://www.spc.noaa.gov/products/outlook/day2otlk_cat.nolyr.geojson","fetched_utc":"2026-03-26T11:52:13.853683+00:00","day":2,"outlook_type":"categorical"}},"tornado":{"type":"FeatureCollection","features":[{"type":"Feature","geometry":{"type":"GeometryCollection","geometries":[]},"properties":{"DN":0,"VALID":"202603271200","EXPIRE":"202603281200","ISSUE":"202603260545","VALID_ISO":"2026-03-27T12:00:00+00:00","EXPIRE_ISO":"2026-03-28T12:00:00+00:00","ISSUE_ISO":"2026-03-26T05:45:00+00:00","FORECASTER":"Moore","LABEL":"Less Than 2% All Areas","LABEL2":"","stroke":"","fill":"","_fill":"#CCCCCC","_stroke":"#888888","_label":"Less Than 2% All Areas","_is_sig":false}}],"_meta":{"source_url":"https://www.spc.noaa.gov/products/outlook/day2otlk_torn.nolyr.geojson","fetched_utc":"2026-03-26T11:52:13.959956+00:00","day":2,"outlook_type":"tornado"}},"wind":{"type":"FeatureCollection","features":[{"type":"Feature","geometry":{"type":"GeometryCollection","geometries":[]},"properties":{"DN":0,"VALID":"202603271200","EXPIRE":"202603281200","ISSUE":"202603260545","VALID_ISO":"2026-03-27T12:00:00+00:00","EXPIRE_ISO":"2026-03-28T12:00:00+00:00","ISSUE_ISO":"2026-03-26T05:45:00+00:00","FORECASTER":"Moore","LABEL":"Less Than 5% All Areas","LABEL2":"","stroke":"","fill":"","_fill":"#CCCCCC","_stroke":"#888888","_label":"Less Than 5% All Areas","_is_sig":false}}],"_meta":{"source_url":"https://www.spc.noaa.gov/products/outlook/day2otlk_wind.nolyr.geojson","fetched_utc":"2026-03-26T11:52:13.991290+00:00","day":2,"outlook_type":"wind"}},"hail":{"type":"FeatureCollection","features":[{"type":"Feature","geometry":{"type":"GeometryCollection","geometries":[]},"properties":{"DN":0,"VALID":"202603271200","EXPIRE":"202603281200","ISSUE":"202603260545","VALID_ISO":"2026-03-27T12:00:00+00:00","EXPIRE_ISO":"2026-03-28T12:00:00+00:00","ISSUE_ISO":"2026-03-26T05:45:00+00:00","FORECASTER":"Moore","LABEL":"Less Than 5% All Areas","LABEL2":"","stroke":"","fill":"","_fill":"#CCCCCC","_stroke":"#888888","_label":"Less Than 5% All Areas","_is_sig":false}}],"_meta":{"source_url":"https://www.spc.noaa.gov/products/outlook/day2otlk_hail.nolyr.geojson","fetched_utc":"2026-03-26T11:52:14.024396+00:00","day":2,"outlook_type":"hail"}}};
var LEGEND_CONFIG = {"categorical":[{"key":"TSTM","fill":"#C1E9C1","label":"Thunderstorm"},{"key":"MRGL","fill":"#66A366","label":"Marginal"},{"key":"SLGT","fill":"#FFE066","label":"Slight"},{"key":"ENH","fill":"#FFA500","label":"Enhanced"},{"key":"MDT","fill":"#E8000D","label":"Moderate"},{"key":"HIGH","fill":"#FF00FF","label":"High"}],"tornado":[{"key":"0.02","fill":"#008B00","label":"2%"},{"key":"0.05","fill":"#8B4513","label":"5%"},{"key":"0.10","fill":"#FFD700","label":"10%"},{"key":"0.15","fill":"#FF4500","label":"15%"},{"key":"0.30","fill":"#FF0000","label":"30%"},{"key":"0.45","fill":"#FF00FF","label":"45%"},{"key":"0.60","fill":"#800080","label":"60%"}],"wind":[{"key":"0.02","fill":"#008B00","label":"2%"},{"key":"0.05","fill":"#8B4513","label":"5%"},{"key":"0.10","fill":"#FFD700","label":"10%"},{"key":"0.15","fill":"#FF4500","label":"15%"},{"key":"0.30","fill":"#FF0000","label":"30%"},{"key":"0.45","fill":"#FF00FF","label":"45%"},{"key":"0.60","fill":"#800080","label":"60%"}],"hail":[{"key":"0.02","fill":"#008B00","label":"2%"},{"key":"0.05","fill":"#8B4513","label":"5%"},{"key":"0.10","fill":"#FFD700","label":"10%"},{"key":"0.15","fill":"#FF4500","label":"15%"},{"key":"0.30","fill":"#FF0000","label":"30%"},{"key":"0.45","fill":"#FF00FF","label":"45%"},{"key":"0.60","fill":"#800080","label":"60%"}]};
var AVAILABLE     = ["categorical", "tornado", "wind", "hail"];

var map = L.map('map',{zoomControl:true,attributionControl:true})
           .setView([37.5,-96],4);

// Basemap – CartoDB Positron (no labels, clean)
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png',{
  attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/">CARTO</a>',
  subdomains:'abcd', maxZoom:19
}).addTo(map);

// Label overlay on top of outlook
var labelLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png',{
  subdomains:'abcd', maxZoom:19, pane:'shadowPane'
}).addTo(map);

var activeLayer = null;
var currentType = AVAILABLE[0] || null;

function normaliseLabel(lbl){
  var n = parseFloat(lbl);
  if (!isNaN(n) && n > 1) n /= 100;
  if (!isNaN(n)) return n.toFixed(2);
  return lbl;
}

function getStyle(feature){
  var p = feature.properties || {};
  var fill   = p._fill   || '#CCCCCC';
  var stroke = p._stroke || '#888888';
  return {
    fillColor:   fill,
    fillOpacity: 0.72,
    color:       stroke,
    weight:      0.8,
    opacity:     1
  };
}

function onEachFeature(feature,layer){
  var p = feature.properties || {};
  var name = p._label || p.LABEL2 || p.LABEL || '';
  var isSig = p._is_sig;
  var tooltip = '<strong>' + (isSig ? 'Significant ' : '') + name + '</strong>';
  layer.bindTooltip(tooltip,{sticky:true,opacity:0.92});
  layer.on('mouseover',function(e){
    var bar = document.getElementById('info-bar');
    bar.textContent = (isSig ? 'Significant ' : '') + name + ' Risk Area';
    bar.style.display = 'block';
  });
  layer.on('mouseout',function(){
    document.getElementById('info-bar').style.display='none';
  });
}

function buildSigHatch(geojson){
  // overlay for significant areas
  var sigFeatures = (geojson.features||[]).filter(function(f){
    return f.properties && f.properties._is_sig;
  });
  if(!sigFeatures.length) return null;
  return L.geoJSON({type:'FeatureCollection',features:sigFeatures},{
    style:function(){return{fillColor:'#000000',fillOpacity:0.15,color:'#000',weight:0.5,
                              dashArray:'3,3'}},
    pane:'overlayPane'
  });
}

function showLayer(type){
  if(activeLayer){ map.removeLayer(activeLayer); activeLayer=null; }

  var data = LAYERS_DATA[type];
  var noDataEl = document.getElementById('no-data');

  if(!data || !data.features || !data.features.length){
    noDataEl.style.display='block';
    updateLegend(type);
    return;
  }
  noDataEl.style.display='none';

  var layer = L.geoJSON(data,{
    style: getStyle,
    onEachFeature: onEachFeature
  }).addTo(map);

  var sigLayer = buildSigHatch(data);
  if(sigLayer) sigLayer.addTo(map);

  activeLayer = type==='categorical'
    ? L.layerGroup([layer, sigLayer].filter(Boolean))
    : L.layerGroup([layer, sigLayer].filter(Boolean));

  updateLegend(type);
}

function updateLegend(type){
  var items = LEGEND_CONFIG[type] || [];
  var data  = LAYERS_DATA[type];
  var usedLabels = new Set();
  if(data && data.features){
    data.features.forEach(function(f){
      var lbl = (f.properties||{})._label;
      if(lbl) usedLabels.add(lbl);
    });
  }
  var container = document.getElementById('legend-items');
  container.innerHTML='';
  items.forEach(function(item){
    if(usedLabels.size && !usedLabels.has(item.label)) return;
    var row=document.createElement('div'); row.className='legend-row';
    var sw=document.createElement('div');  sw.className='legend-swatch';
    sw.style.background=item.fill;
    var lb=document.createElement('span'); lb.className='legend-label';
    lb.textContent=item.label;
    row.appendChild(sw); row.appendChild(lb);
    container.appendChild(row);
  });
  // Significant row
  var sigRow=document.createElement('div'); sigRow.className='legend-row';
  var sigSw=document.createElement('div');  sigSw.className='legend-swatch sig-swatch';
  var sigLb=document.createElement('span'); sigLb.className='legend-label';
  sigLb.textContent='Significant';
  sigRow.appendChild(sigSw); sigRow.appendChild(sigLb);
  container.appendChild(sigRow);
}

// Tab switching
document.querySelectorAll('.tab-btn').forEach(function(btn){
  btn.addEventListener('click',function(){
    document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active')});
    btn.classList.add('active');
    currentType = btn.dataset.type;
    showLayer(currentType);
  });
});

if(currentType) showLayer(currentType);

})();
</script>
</body>
</html>
