name: Update SPC Outlooks

on:
  schedule:
    # Run every 30 minutes
    - cron: "*/30 * * * *"
  workflow_dispatch:   # Allow manual trigger from GitHub UI
  push:
    branches: [main, "claude/**"]
    paths:
      - "scripts/**"
      - ".github/workflows/update_outlooks.yml"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install system dependencies for cartopy
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgeos-dev libproj-dev proj-data proj-bin \
            libspatialindex-dev

      - name: Install Python dependencies
        run: pip install --quiet -r scripts/requirements.txt

      - name: Pre-download Cartopy Natural Earth data
        run: |
          python - <<'EOF'
          import cartopy.io.shapereader as shpreader
          for res in ("50m",):
              for cat, name in [
                  ("physical", "ocean"),
                  ("physical", "land"),
                  ("physical", "lakes"),
                  ("physical", "coastline"),
                  ("cultural", "admin_0_countries"),
                  ("cultural", "admin_1_states_provinces"),
              ]:
                  try:
                      shpreader.natural_earth(resolution=res, category=cat, name=name)
                      print(f"  OK {res}/{cat}/{name}")
                  except Exception as e:
                      print(f"  WARN {res}/{cat}/{name}: {e}")
          EOF

      - name: Run full pipeline
        run: python scripts/run_all.py output

      - name: Check for changes
        id: check_changes
        run: |
          git add output/
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push updated outlooks
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
          git commit -m "chore: update SPC outlooks [${TIMESTAMP}]"
          git push origin HEAD
